</style></head> <body data-astro-cid-sckkx6r4>  <h1>感谢您安装字体管理器！</h1> <p>Source: <a href="https://github.com/otoneko1102/font-manager" target="_blank">GitHub</a></p> <p>此页面的原始字体为 &#39;serif&#39;。如果显示为不同的字体，说明扩展程序运行正常！</p> <p>如果未生效，请检查&quot;启用扩展程序&quot;。</p> <p>有其他字体需求吗？请在 <a href="https://github.com/otoneko1102/font-manager/issues" target="_blank">GitHub</a> 或 <a href="https://discord.gg/yKW8wWKCnS" target="_blank">Discord</a> 进行反馈！</p> <h2>当前已注册的字体数量： <span id="number">Loading...</span></h2> <ul id="fonts"></ul>  <script type="module">document.addEventListener("DOMContentLoaded",async()=>{const n=document.getElementById("number"),o=document.getElementById("fonts");if(!(!n||!o))try{const e=await fetch("https://raw.githubusercontent.com/otoneko1102/font-manager/main/fonts.json");if(!e.ok)throw new Error(`HTTP error! Status: ${e.status}`);const t=await e.json();if(t.fonts&&Array.isArray(t.fonts)){let s="";for(const c of t.fonts)s+=`<li>${c}</li>`;o.innerHTML=s,n.textContent=String(t.fonts.length)}else throw new Error("Invalid JSON structure")}catch(r){n.textContent="Error",console.error("Fetch error:",r)}});</script> </body> </html>
