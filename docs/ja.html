</style></head> <body data-astro-cid-sckkx6r4>  <h1>フォントマネージャーをインストールしていただきありがとうございます！</h1> <p>Source: <a href="https://github.com/otoneko1102/font-manager" target="_blank">GitHub</a></p> <p>このページの元のフォントは &#39;serif&#39; です。異なるフォントで表示されていれば、拡張機能は正常に動作しています！</p> <p>動作していない場合は、「拡張機能を有効化」をチェックしてください。</p> <p>他に追加してほしいフォントはありますか？ <a href="https://github.com/otoneko1102/font-manager/issues" target="_blank">GitHub</a> または <a href="https://discord.gg/yKW8wWKCnS" target="_blank">Discord</a> でサポートを受け付けています！</p> <h2>現在登録されているフォント数: <span id="number">Loading...</span></h2> <ul id="fonts"></ul>  <script type="module">document.addEventListener("DOMContentLoaded",async()=>{const n=document.getElementById("number"),o=document.getElementById("fonts");if(!(!n||!o))try{const e=await fetch("https://raw.githubusercontent.com/otoneko1102/font-manager/main/fonts.json");if(!e.ok)throw new Error(`HTTP error! Status: ${e.status}`);const t=await e.json();if(t.fonts&&Array.isArray(t.fonts)){let s="";for(const c of t.fonts)s+=`<li>${c}</li>`;o.innerHTML=s,n.textContent=String(t.fonts.length)}else throw new Error("Invalid JSON structure")}catch(r){n.textContent="Error",console.error("Fetch error:",r)}});</script> </body> </html>
