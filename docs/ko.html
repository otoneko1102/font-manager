</style></head> <body data-astro-cid-sckkx6r4>  <h1>폰트 관리자를 설치해 주셔서 감사합니다!</h1> <p>Source: <a href="https://github.com/otoneko1102/font-manager" target="_blank">GitHub</a></p> <p>이 페이지의 기본 글꼴은 &#39;serif&#39;입니다. 다른 글꼴로 표시되면 확장 프로그램이 정상적으로 작동하는 것입니다!</p> <p>작동하지 않는 경우 &#39;확장 프로그램 활성화&#39;를 확인하세요.</p> <p>추가하고 싶은 글꼴이 있나요? <a href="https://github.com/otoneko1102/font-manager/issues" target="_blank">GitHub</a> 또는 <a href="https://discord.gg/yKW8wWKCnS" target="_blank">Discord</a>에서 지원을 요청하세요!</p> <h2>현재 등록된 글꼴 수: <span id="number">Loading...</span></h2> <ul id="fonts"></ul>  <script type="module">document.addEventListener("DOMContentLoaded",async()=>{const n=document.getElementById("number"),o=document.getElementById("fonts");if(!(!n||!o))try{const e=await fetch("https://raw.githubusercontent.com/otoneko1102/font-manager/main/fonts.json");if(!e.ok)throw new Error(`HTTP error! Status: ${e.status}`);const t=await e.json();if(t.fonts&&Array.isArray(t.fonts)){let s="";for(const c of t.fonts)s+=`<li>${c}</li>`;o.innerHTML=s,n.textContent=String(t.fonts.length)}else throw new Error("Invalid JSON structure")}catch(r){n.textContent="Error",console.error("Fetch error:",r)}});</script> </body> </html>
