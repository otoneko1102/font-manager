name: Release Extension

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Commit updated fonts.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fonts.json src/fonts.json
          if git diff --cached --quiet; then
            echo "fonts.json unchanged, skipping commit"
          else
            git commit -m "chore: update fonts.json [skip ci]"
            git push
          fi

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create ZIP
        run: |
          cd dist
          zip -r "../Chrome_font-manager-v${{ steps.version.outputs.version }}.zip" .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: |
            Chrome_font-manager-v${{ steps.version.outputs.version }}.zip
            fonts.json
          generate_release_notes: true
